<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Projects</title>
</head>

<body>

<h1>Projects</h1>
<h2>Create Project</h2>

<form th:action="@{/projects}" th:object="${project}" method="post">
    
    <label>Title:</label>
    <input type="text" th:field="*{title}" required />

    <br/>

    <label>Description:</label>
    <input type="text" th:field="*{description}" required />

    <br/>

    <button type="submit">Create</button>
</form>
<ul>
    <li th:each="project : ${projects}">
        <span th:text="${project.title}"></span> -
        <span th:text="${project.description}"></span>
        <span th:text="${project.user.username}"></span>
        <span th:each="task : ${project.tasks}">
            <br/>
            <span th:text="${task.title}"></span> -
            <span th:text="${task.description}"></span>
     
    </li>
</ul>

</body>
</html>
